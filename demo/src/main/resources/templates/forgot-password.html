<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container" style="max-width: 400px;">
    <div class="card shadow p-4">
        <h3 class="text-center mb-3">Quên Mật Khẩu</h3>
        <p class="text-muted text-center text-sm">Nhập email của bạn, chúng tôi sẽ gửi đường dẫn khôi phục mật khẩu.</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Nhập email của bạn" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 mb-2">Gửi yêu cầu</button>
        </form>
        <div class="text-center">
            <a href="/login" class="text-decoration-none">Quay lại Đăng nhập</a>
        </div>
    </div>
</div>
</body>
</html>
