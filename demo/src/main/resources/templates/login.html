<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - EduTHPT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card {
            background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden; max-width: 1000px; width: 100%; display: flex; flex-wrap: wrap;
        }
        .auth-image {
            background: linear-gradient(135deg, #6B46C1, #805AD5); width: 50%; padding: 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .auth-image img { width: 80%; max-width: 350px; animation: float 4s ease-in-out infinite; }
        .auth-form { width: 50%; padding: 60px 50px; display: flex; flex-direction: column; justify-content: center; }

        .form-control { padding: 12px 15px; border-radius: 8px; background-color: #f1f5f9; border: 1px solid transparent; }
        .form-control:focus { background-color: #fff; border-color: #00a8cc; box-shadow: 0 0 0 0.2rem rgba(0, 168, 204, 0.25); }
        .btn-primary-custom { background-color: #00a8cc; border: none; padding: 12px; border-radius: 8px; font-weight: 600; color: white; transition: 0.3s; }
        .btn-primary-custom:hover { background-color: #008ca8; }
        .btn-google { border: 1px solid #dee2e6; background: white; color: #495057; padding: 12px; border-radius: 8px; font-weight: 500; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-google:hover { background: #f8f9fa; border-color: #adb5bd; }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        @media (max-width: 768px) { .auth-image { display: none; } .auth-form { width: 100%; padding: 40px 30px; } }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-image d-none d-md-flex">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/online-learning-4438870-3728362.png" alt="EduTHPT Learning">
            <h3 class="fw-bold mt-4">Chào mừng trở lại!</h3>
            <p class="text-white-50 mt-2">Đăng nhập để tiếp tục lộ trình chinh phục điểm 9+ Đại Học cùng hệ thống EduTHPT.</p>
        </div>

        <div class="auth-form">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Đăng Nhập</h2>
                <p class="text-muted">Chưa có tài khoản? <a href="/register" class="text-decoration-none fw-bold" style="color: #6B46C1;">Đăng ký ngay</a></p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger text-sm py-2"><i class="bi bi-exclamation-triangle"></i> Email hoặc mật khẩu không đúng.</div>
            <div th:if="${param.logout}" class="alert alert-success text-sm py-2"><i class="bi bi-check-circle"></i> Đăng xuất thành công.</div>
            <div th:if="${success}" class="alert alert-success text-sm py-2" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Email của bạn</label>
                    <input type="email" name="email" class="form-control" placeholder="vidu@gmail.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label text-muted small fw-bold mb-0">Mật khẩu</label>
                        <a href="/forgot-password" class="text-decoration-none small" style="color: #00a8cc;">Quên mật khẩu?</a>
                    </div>
                    <input type="password" name="password" class="form-control mt-2" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 mb-4">Đăng Nhập <i class="bi bi-box-arrow-in-right ms-1"></i></button>

                <div class="position-relative text-center mb-4">
                    <hr class="text-muted">
                    <span class="position-absolute top-50 translate-middle px-2 bg-white text-muted small" style="left: 50%;">HOẶC</span>
                </div>

                <a href="/oauth2/authorization/google" class="btn btn-google w-100 text-decoration-none">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width: 20px;">
                    Tiếp tục với Google
                </a>
            </form>

            <div class="text-center mt-4">
                <a href="/" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
