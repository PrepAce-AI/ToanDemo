<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - EduTHPT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
        }
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            flex-direction: row-reverse; /* Đảo ảnh sang phải, form sang trái */
        }
        .auth-image {
            background: linear-gradient(135deg, #00a8cc, #0284c7); /* Nền gradient màu xanh ngọc */
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .auth-image img {
            width: 80%;
            max-width: 350px;
            animation: float 4s ease-in-out infinite;
        }
        .auth-form {
            width: 50%;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
            background-color: #f1f5f9;
            border: 1px solid transparent;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #6B46C1;
            box-shadow: 0 0 0 0.2rem rgba(107, 70, 193, 0.25);
        }
        .btn-primary-custom {
            background-color: #6B46C1; /* Nút bấm màu tím Edu */
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            transition: 0.3s;
        }
        .btn-primary-custom:hover {
            background-color: #553c9a;
            color: white;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        @media (max-width: 768px) {
            .auth-image { display: none; } /* Ẩn ảnh trên điện thoại */
            .auth-form { width: 100%; padding: 40px 30px; }
        }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-image d-none d-md-flex">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/student-studying-online-4438864-3728356.png" alt="EduTHPT Register">
            <h3 class="fw-bold mt-4">Bắt đầu hành trình</h3>
            <p class="text-white-50 mt-2">Tạo tài khoản ngay hôm nay để trải nghiệm các bài test năng lực và hệ thống khóa học chất lượng cao.</p>
        </div>

        <div class="auth-form">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Tạo Tài Khoản</h2>
                <p class="text-muted">Đã có tài khoản? <a href="/login" class="text-decoration-none fw-bold" style="color: #00a8cc;">Đăng nhập ngay</a></p>
            </div>

            <div th:if="${error}" class="alert alert-danger text-sm py-2"><i class="bi bi-exclamation-triangle-fill me-1"></i> <span th:text="${error}"></span></div>
            <div th:if="${success}" class="alert alert-success text-sm py-2"><i class="bi bi-check-circle-fill me-1"></i> <span th:text="${success}"></span></div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Họ và Tên</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Email của bạn</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="vidu@gmail.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Mật khẩu</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 mb-3">Đăng Ký <i class="bi bi-person-plus-fill ms-1"></i></button>

                <p class="text-center text-muted small">Bằng việc đăng ký, bạn đồng ý với <a href="#" class="text-decoration-none text-dark fw-bold">Điều khoản</a> và <a href="#" class="text-decoration-none text-dark fw-bold">Bảo mật</a> của hệ thống EduTHPT.</p>
            </form>

            <div class="text-center mt-2">
                <a href="/" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
